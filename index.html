<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yusuf Suleiman Babana | Data Scientist</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #0b0f19;
      --panel: rgba(255,255,255,.06);
      --panel-2: rgba(255,255,255,.09);
      --text: rgba(255,255,255,.9);
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.14);
      --accent: #7c5cff;
      --accent-2:#23c4ff;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 18px;
      --max: 1100px;
    }

    *{ box-sizing: border-box; }
    html{ scroll-behavior: smooth; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,.30), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(35,196,255,.22), transparent 55%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a{ color: inherit; text-decoration: none; }
    .container{ width: min(var(--max), calc(100% - 40px)); margin: 0 auto; }

    /* Top Nav */
    .nav{
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      background: rgba(11, 15, 25, .55);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 0;
      gap: 16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .brand .dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 0 6px rgba(124,92,255,.12);
    }

    .nav-links{
      display:flex;
      gap: 18px;
      align-items:center;
      font-weight: 500;
      color: var(--muted);
    }
    .nav-links a{
      padding: 10px 10px;
      border-radius: 10px;
      transition: .2s ease;
    }
    .nav-links a:hover{
      background: rgba(255,255,255,.06);
      color: var(--text);
    }

    .cta{
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.09); }
    .btn.primary{
      border: none;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #081018;
      box-shadow: 0 14px 35px rgba(124,92,255,.22);
    }

    .hamburger{
      display:none;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor: pointer;
    }

    /* Hero */
    .hero{
      padding: 54px 0 28px;
    }
    .hero-grid{
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 26px;
      align-items: stretch;
    }
    .hero-card{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      overflow: hidden;
      position: relative;
    }
    .hero-card::after{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(600px 200px at 20% 0%, rgba(124,92,255,.22), transparent 55%),
                  radial-gradient(600px 200px at 90% 10%, rgba(35,196,255,.18), transparent 55%);
      pointer-events:none;
      opacity: .9;
    }
    .hero-card > *{ position: relative; z-index: 1; }

    .kicker{
      display:inline-flex;
      gap: 10px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
      width: fit-content;
    }
    .kicker span{
      color: #081018;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    h1{
      margin: 14px 0 10px;
      font-size: clamp(32px, 4vw, 46px);
      line-height: 1.1;
      letter-spacing: -0.8px;
    }
    .subtitle{
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      max-width: 60ch;
    }
    .chips{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 22px;
    }
    .chip{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
    }

    .hero-actions{
      display:flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .profile{
      display:flex;
      flex-direction: column;
      gap: 14px;
    }
    .profile-top{
      display:flex;
      gap: 14px;
      align-items:center;
    }
    .avatar{
      width: 72px;
      height: 72px;
      border-radius: 20px;
      border: 1px solid var(--line);
      object-fit: cover;
      background: rgba(255,255,255,.06);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .profile h2{
      font-size: 18px;
      margin: 0;
    }
    .profile p{
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .stats{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    .stat{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 12px;
    }
    .stat strong{
      display:block;
      font-size: 18px;
      letter-spacing: -0.3px;
    }
    .stat span{
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    /* Sections */
    section{
      padding: 24px 0;
    }
    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap: 14px;
      margin: 18px 0 14px;
    }
    .section-title h3{
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.3px;
    }
    .section-title p{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 60ch;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .card{
      grid-column: span 6;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }
    .card h4{
      margin: 0 0 8px;
      font-size: 16px;
    }
    .card p{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* Projects (Accordion) */
    .projects{ display:flex; flex-direction: column; gap: 12px; }
    details.project{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      overflow:hidden;
    }
    details.project summary{
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      user-select:none;
    }
    details.project summary::-webkit-details-marker{ display:none; }
    .proj-title{
      display:flex;
      flex-direction: column;
      gap: 4px;
    }
    .proj-title strong{ font-size: 16px; }
    .proj-title span{ color: var(--muted); font-size: 13px; font-weight: 600; }
    .chev{
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.05);
      transition: .2s ease;
    }
    details[open] .chev{ transform: rotate(180deg); }
    .proj-body{
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .proj-body .row{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .proj-body a.link{
      color: #081018;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .proj-body .sub{
      margin: 10px 0 0;
    }
    .proj-body ul{
      margin: 10px 0 0;
      padding-left: 18px;
    }
    .proj-body li{ margin: 6px 0; }

    /* Contact */
    .contact{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
      align-items: stretch;
    }
    .contact .card{ grid-column: auto; }
    .contact-list{
      display:flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .contact-item{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      border-radius: 14px;
      padding: 12px 14px;
      display:flex;
      justify-content:space-between;
      gap: 12px;
      align-items:center;
    }
    .contact-item span{ color: var(--muted); font-weight: 600; font-size: 13px; }

    footer{
      padding: 26px 0 40px;
      color: var(--muted);
      text-align:center;
      border-top: 1px solid var(--line);
      margin-top: 26px;
    }

    /* Mobile */
    @media (max-width: 920px){
      .hero-grid{ grid-template-columns: 1fr; }
      .card{ grid-column: span 12; }
      .contact{ grid-template-columns: 1fr; }
    }
    @media (max-width: 720px){
      .nav-links{ display:none; }
      .hamburger{ display:inline-flex; align-items:center; justify-content:center; }
      .mobile-menu{
        display:none;
        border-top: 1px solid var(--line);
        padding: 10px 0 16px;
      }
      .mobile-menu a{
        display:block;
        padding: 12px 6px;
        color: var(--muted);
        font-weight: 600;
      }
      .mobile-menu a:hover{ color: var(--text); }
    }
  </style>

  <script>
    function toggleMobileMenu(){
      const menu = document.getElementById("mobileMenu");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }
    // Close mobile menu when a link is clicked
    function closeMobileMenu(){
      const menu = document.getElementById("mobileMenu");
      if(menu) menu.style.display = "none";
    }
  </script>
</head>

<body>

    <div class="container">
      <div class="nav-inner">
        <div class="brand">
          <div class="dot"></div>
          <div>Yusuf Babana</div>

        <nav class="nav-links">
          <a href="#about">About</a>

        </nav>

          <a class="btn" href="#projects">View Work</a>
